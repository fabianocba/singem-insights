# ============================================================
# SINGEM — docker-compose.gpu.yml
# Override para habilitar GPU NVIDIA no AI Core
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml \
#     --profile ai up --build
#
# Requisitos:
#   - NVIDIA Driver instalado no host
#   - NVIDIA Container Toolkit (nvidia-docker2)
#   - GPU_ENABLED=true no .env
# ============================================================

services:
  ai-core:
    build:
      args:
        GPU_ENABLED: "true"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 4G
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-sentence-transformers}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
