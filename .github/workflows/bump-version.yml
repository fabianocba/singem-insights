name: Bump Version + Tag + Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'chore: bump version to')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Bump patch
        id: bump
        run: |
          set -euo pipefail
          V=$(jq -r '.version' js/core/version.json)
          IFS='.' read -r A B C <<< "$V"
          N="${A}.${B}.$((C+1))"
          BUILD=$(date -u +%Y%m%d-%H%M)
          TS=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          jq --arg v "$N" --arg b "$BUILD" --arg t "$TS" '.name="SINGEM"|.version=$v|.build=$b|.buildTimestamp=$t' js/core/version.json > /tmp/v.json
          mv /tmp/v.json js/core/version.json
          DATE_UTC=$(date -u +%F)
          if ! grep -q "## \[$N\]" CHANGELOG.md; then
            printf "## [%s] - %s\n- chore: bump automático de versão\n\n" "$N" "$DATE_UTC" | cat - CHANGELOG.md > /tmp/changelog.md
            mv /tmp/changelog.md CHANGELOG.md
          fi
          echo "version=$N" >> $GITHUB_OUTPUT

      - name: Commit + tag
        run: |
          set -euo pipefail
          V="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/core/version.json CHANGELOG.md
          git commit -m "chore: bump version to ${V} [skip ci]" || exit 0
          git tag "v${V}"
          git push origin main
          git push origin "v${V}"
