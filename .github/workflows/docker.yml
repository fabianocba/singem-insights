# ============================================================
# SINGEM — Docker CI/CD Pipeline
# Build, test e push de imagens Docker para GHCR
#
# Triggers:
#   - Push em main ou dev (paths docker-related)
#   - Tags v*.*.*
#   - workflow_dispatch manual
# ============================================================
name: Docker Build & Push

on:
  push:
    branches: [main, dev]
    paths:
      - "Dockerfile.*"
      - "docker-compose*.yml"
      - "docker/**"
      - "server/**"
      - "js/**"
      - "css/**"
      - "index.html"
      - "sw.js"
      - "version.json"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile.*"
      - "docker-compose*.yml"
      - "docker/**"
      - "server/**"
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push images to GHCR"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/singem

jobs:
  # ----------------------------------------------------------
  # Lint: valida compose + Dockerfiles
  # ----------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Validate docker-compose.prod.yml
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet

      - name: Validate docker-compose.test.yml
        run: docker compose -f docker-compose.test.yml config --quiet

      - name: Lint Dockerfiles with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.backend
          failure-threshold: warning
        continue-on-error: true

      - name: Lint Dockerfile.frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.frontend
          failure-threshold: warning
        continue-on-error: true

  # ----------------------------------------------------------
  # Build: constrói imagens e testa health
  # ----------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        include:
          - target: backend
            dockerfile: Dockerfile.backend
          - target: frontend
            dockerfile: Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.target }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: singem-${{ matrix.target }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image starts
        run: |
          if [ "${{ matrix.target }}" = "frontend" ]; then
            docker run --rm -d --name test-container singem-${{ matrix.target }}:test
            sleep 3
            docker exec test-container wget -qO- http://localhost/ || true
            docker stop test-container
          fi

  # ----------------------------------------------------------
  # Integration: sobe stack completa e testa conectividade
  # ----------------------------------------------------------
  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests (isolated environment)
        run: |
          docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from test-runner
        timeout-minutes: 10

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs --tail=80

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans

  # ----------------------------------------------------------
  # Push: publica imagens no GHCR (main/tags apenas)
  # ----------------------------------------------------------
  push:
    runs-on: ubuntu-latest
    needs: integration
    if: |
      github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.push_images == 'true')
    strategy:
      matrix:
        include:
          - target: backend
            dockerfile: Dockerfile.backend
          - target: frontend
            dockerfile: Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.target }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
