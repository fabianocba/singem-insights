name: Deploy Hostinger Staging
on:
  push:
    branches: [dev, staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            cd /var/www/singem-staging

            # 1. Atualiza código-fonte
            git fetch --all --tags
            BRANCH="${{ github.ref_name }}"
            git reset --hard origin/${BRANCH}

            # 2. Deploy via Docker Compose
            cd docker/prod
            if [ ! -f .env ]; then
              echo "❌ docker/prod/.env não encontrado. Execute docker-setup primeiro."
              exit 1
            fi
            docker compose pull --ignore-buildable 2>/dev/null || true
            docker compose up -d --build --remove-orphans

            # 3. Aguarda backend saudável (max 90s)
            echo "⏳ Aguardando backend ficar saudável..."
            TRIES=0
            MAX=30
            until docker compose exec -T backend wget -qO- http://localhost:3000/health >/dev/null 2>&1; do
              TRIES=$((TRIES + 1))
              if [ "$TRIES" -ge "$MAX" ]; then
                echo "⚠️ Backend não respondeu após ${MAX} tentativas. Verificar logs:"
                docker compose logs --tail=30 backend
                exit 1
              fi
              sleep 3
            done
            echo "✅ Backend saudável."

            # 4. Limpa imagens antigas
            docker image prune -f --filter "until=72h" 2>/dev/null || true
