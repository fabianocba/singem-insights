# ============================================================
# SINGEM — Docker Compose DESENVOLVIMENTO LOCAL (OFICIAL)
# ============================================================

name: singem-dev

networks:
  singem-network:
    driver: bridge

volumes:
  postgres_data:
  backend_logs:
  redis_data:

services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SINGEM_DB_NAME:-singem}
      POSTGRES_USER: ${SINGEM_DB_USER:-adm}
      POSTGRES_PASSWORD: ${SINGEM_DB_PASSWORD:-Singem@12345}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT_EXTERNAL:-5432}:5432'
    networks:
      - singem-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${SINGEM_DB_USER:-adm} -d ${SINGEM_DB_NAME:-singem}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - '${REDIS_PORT_EXTERNAL:-6379}:6379'
    networks:
      - singem-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ../..
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${SINGEM_DB_NAME:-singem}
      DB_USER: ${SINGEM_DB_USER:-adm}
      DB_PASSWORD: ${SINGEM_DB_PASSWORD:-Singem@12345}
      DATABASE_URL: >-
        postgresql://${SINGEM_DB_USER:-adm}:${SINGEM_DB_PASSWORD:-Singem@12345}@postgres:5432/${SINGEM_DB_NAME:-singem}
      TRUST_PROXY: 'false'
      API_BODY_LIMIT: ${API_BODY_LIMIT:-10mb}
      CORS_ORIGINS: ${SINGEM_CORS_ORIGINS:-http://localhost:8000,http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_do_not_use_in_production_32chars!}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ADMIN_LOGIN: ${SINGEM_ADMIN_LOGIN:-adm}
      ADMIN_NOME: ${ADMIN_NOME:-Administrador SINGEM}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ifbaiano.edu.br}
      ADMIN_PASSWORD: ${SINGEM_ADMIN_PASSWORD:-Singem@12345}
      GOVBR_ENABLED: ${GOVBR_ENABLED:-false}
      SERPRO_ENABLED: ${SERPRO_ENABLED:-false}
      SERPROID_ENABLED: ${SERPROID_ENABLED:-false}
      CATMAT_ENABLED: ${CATMAT_ENABLED:-false}
      CATMAT_OBRIGATORIO: ${CATMAT_OBRIGATORIO:-false}
      AI_CORE_ENABLED: ${AI_CORE_ENABLED:-true}
      AI_CORE_BASE_URL: ${AI_CORE_BASE_URL:-http://ai-core:8010}
      AI_CORE_API_PREFIX: ${AI_CORE_API_PREFIX:-/ai}
      AI_CORE_INTERNAL_TOKEN: ${AI_CORE_INTERNAL_TOKEN:-dev-token-local}
      AI_CORE_TIMEOUT_MS: ${AI_CORE_TIMEOUT_MS:-15000}
      AI_CORE_HEALTH_TIMEOUT_MS: ${AI_CORE_HEALTH_TIMEOUT_MS:-2500}
      COMPRASGOV_BASE_URL: ${COMPRASGOV_BASE_URL:-https://dadosabertos.compras.gov.br}
      COMPRASGOV_TIMEOUT_MS: ${COMPRASGOV_TIMEOUT_MS:-30000}
      COMPRASGOV_MAX_RETRIES: ${COMPRASGOV_MAX_RETRIES:-3}
      COMPRASGOV_RETRY_BASE_DELAY_MS: ${COMPRASGOV_RETRY_BASE_DELAY_MS:-400}
      COMPRASGOV_RATE_LIMIT_MS: ${COMPRASGOV_RATE_LIMIT_MS:-250}
      COMPRASGOV_CACHE_ENABLED: ${COMPRASGOV_CACHE_ENABLED:-true}
      COMPRASGOV_CACHE_TTL_CATALOGO_SECONDS: ${COMPRASGOV_CACHE_TTL_CATALOGO_SECONDS:-86400}
      COMPRASGOV_CACHE_TTL_PESQUISA_SECONDS: ${COMPRASGOV_CACHE_TTL_PESQUISA_SECONDS:-21600}
      COMPRASGOV_CACHE_TTL_FORNECEDOR_UASG_SECONDS: ${COMPRASGOV_CACHE_TTL_FORNECEDOR_UASG_SECONDS:-43200}
      COMPRASGOV_CACHE_TTL_DEFAULT_SECONDS: ${COMPRASGOV_CACHE_TTL_DEFAULT_SECONDS:-3600}
      COMPRASGOV_MAX_PAGE_SIZE: ${COMPRASGOV_MAX_PAGE_SIZE:-500}
      COMPRASGOV_MAX_AUTO_PAGES: ${COMPRASGOV_MAX_AUTO_PAGES:-20}
      COMPRASGOV_AUDIT_ENABLED: ${COMPRASGOV_AUDIT_ENABLED:-true}
      COMPRASGOV_SNAPSHOT_ENABLED: ${COMPRASGOV_SNAPSHOT_ENABLED:-true}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8000}
    ports:
      - '${BACKEND_PORT_EXTERNAL:-3000}:3000'
    networks:
      - singem-network
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../storage:/app/storage
      - backend_logs:/app/logs
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../..
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT_EXTERNAL:-8000}:80'
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - singem-network
    depends_on:
      backend:
        condition: service_healthy

  ai-core:
    container_name: singem-dev-ai-core
    build:
      context: ../..
      dockerfile: Dockerfile.ai
      args:
        GPU_ENABLED: 'false'
    restart: unless-stopped
    environment:
      APP_ENV: development
      APP_DEBUG: 'true'
      AI_CORE_HOST: 0.0.0.0
      AI_CORE_PORT: 8010
      AI_CORE_RELOAD: 'false'
      AI_INTERNAL_TOKEN: ${AI_CORE_INTERNAL_TOKEN:-dev-token-local}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${SINGEM_DB_NAME:-singem}
      DB_USER: ${SINGEM_DB_USER:-adm}
      DB_PASSWORD: ${SINGEM_DB_PASSWORD:-Singem@12345}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-hash}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      ENABLE_VECTOR_SEARCH: ${ENABLE_VECTOR_SEARCH:-true}
    ports:
      - '${AI_PORT_EXTERNAL:-8010}:8010'
    networks:
      - singem-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import json,urllib.request,sys; data=json.load(urllib.request.urlopen('http://localhost:8010/ai/health', timeout=5)); sys.exit(0 if data.get('ok') else 1)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
