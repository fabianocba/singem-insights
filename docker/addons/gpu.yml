# ============================================================
# SINGEM — GPU NVIDIA para AI Core
# Addon plugável — sobrescreve configuração do ai-core
#
# Uso com local:
#   cd docker/local
#   docker compose --profile ai -f docker-compose.yml -f ../addons/gpu.yml up --build
#
# Requisitos:
#   - NVIDIA Driver instalado no host
#   - NVIDIA Container Toolkit (nvidia-docker2)
# ============================================================

services:
  ai-core:
    build:
      args:
        GPU_ENABLED: 'true'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 4G
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-sentence-transformers}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
