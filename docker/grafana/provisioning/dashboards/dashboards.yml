# Grafana — Auto-provisioning dashboard directory
apiVersion: 1

providers:
  - name: 'SINGEM'
    orgId: 1
    folder: 'SINGEM'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
