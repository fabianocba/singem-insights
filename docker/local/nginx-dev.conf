# ============================================================
# SINGEM — Nginx DEV configuration (local development)
# Rate limits relaxados para suportar burst de ES modules
# ============================================================

# ---- Rate Limiting (relaxado para dev) --------------------
# Zona geral: 200 req/s por IP (burst até 400)
limit_req_zone $binary_remote_addr zone=general:10m rate=200r/s;
# Zona API: 50 req/s por IP
limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
# Zona login/auth: 10 req/s por IP
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
# Limite de conexões simultâneas por IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Limites gerais ------------------------------------
    limit_conn conn_limit 200;
    limit_req  zone=general burst=400 nodelay;

    # Retorna 429 (Too Many Requests) em vez de 503
    limit_req_status  429;
    limit_conn_status 429;

    # ---- Compressão ----------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;
    gzip_min_length 256;

    # ---- Segurança básica ----------------------------------
    add_header X-Frame-Options       "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ---- Bloqueia acesso a arquivos sensíveis --------------
    location ~ /\.(env|git|htaccess|gitignore) {
        deny all;
        return 404;
    }

    location ~ ^/(server|singem-ai|node_modules|scripts|docs|tests)/ {
        deny all;
        return 404;
    }

    # ---- Proxy para a API do backend ----------------------
    location /api/ {
        limit_req zone=api burst=60 nodelay;

        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        proxy_cache_bypass $http_upgrade;
    }

    # ---- Auth endpoints — rate limit rigoroso -------------
    location ~ ^/api/(auth|login|token) {
        limit_req zone=auth burst=20 nodelay;

        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- Health passthrough (monitoramento externo) -------
    location = /backend-health {
        proxy_pass       http://backend:3000/health;
        proxy_set_header Host $host;
        access_log       off;
    }

    # ---- Service Worker — nunca usar cache ----------------
    location = /sw.js {
        expires    -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header X-Frame-Options       "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options "nosniff"                      always;
        add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
    }

    # ---- JS/CSS críticos sem cache (consistência entre máquinas) ----
    location ~* \.(js|css)$ {
        expires            -1;
        add_header         Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header         X-Frame-Options       "SAMEORIGIN"                    always;
        add_header         X-Content-Type-Options "nosniff"                      always;
        add_header         Referrer-Policy       "strict-origin-when-cross-origin" always;
        access_log         off;
    }

    # ---- Assets de mídia com cache longo ------------------
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|pdf)$ {
        expires            7d;
        add_header         Cache-Control "public, max-age=604800, must-revalidate";
        add_header         X-Frame-Options       "SAMEORIGIN"                    always;
        add_header         X-Content-Type-Options "nosniff"                      always;
        add_header         Referrer-Policy       "strict-origin-when-cross-origin" always;
        access_log         off;
    }

    # ---- version.json — sem cache -------------------------
    location = /version.json {
        expires    -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Frame-Options       "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options "nosniff"                      always;
        add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
    }

    # ---- SPA fallback / rotas client-side -----------------
    location / {
        expires    -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
