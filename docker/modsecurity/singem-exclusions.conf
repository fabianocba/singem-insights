# ============================================================
# SINGEM — ModSecurity Exclusion Rules
# Regras customizadas para evitar falsos positivos
#
# Este arquivo é carregado DEPOIS das regras OWASP CRS.
# Use para desabilitar regras que causam falso positivo na
# aplicação SINGEM.
# ============================================================

# --- Health check endpoints (não precisam de inspeção) ------
SecRule REQUEST_URI "@beginsWith /health" \
    "id:999001,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920350,\
    ctl:ruleEngine=Off"

SecRule REQUEST_URI "@beginsWith /metrics" \
    "id:999002,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off"

# --- API JSON endpoints (permitir content-type JSON) --------
# CRS pode bloquear payloads JSON com caracteres especiais
SecRule REQUEST_URI "@beginsWith /api/" \
    "id:999010,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920420,\
    ctl:ruleRemoveById=921180"

# --- NF-e XML upload (XML legítimo, não é ataque XXE) -------
SecRule REQUEST_URI "@beginsWith /api/nfe" \
    "id:999020,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=200002,\
    ctl:ruleRemoveById=200003,\
    ctl:ruleRemoveById=941100,\
    ctl:ruleRemoveById=941110,\
    ctl:ruleRemoveById=941120,\
    ctl:ruleRemoveById=941130,\
    ctl:ruleRemoveById=941140"

# --- Sync endpoint (pode ter payloads grandes) --------------
SecRule REQUEST_URI "@beginsWith /api/sync" \
    "id:999030,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920350,\
    ctl:ruleRemoveById=920370"

# --- Service Worker e assets estáticos (sem inspeção) -------
SecRule REQUEST_URI "@endsWith .js" \
    "id:999040,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off"

SecRule REQUEST_URI "@endsWith .css" \
    "id:999041,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off"
