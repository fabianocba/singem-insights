# ============================================================
# SINGEM — Nginx configuration
# Serve o frontend estático e faz proxy da API para o backend
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Compressão ----------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;
    gzip_min_length 256;

    # ---- Segurança básica ----------------------------------
    add_header X-Frame-Options       "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ---- Bloqueia acesso a arquivos sensíveis --------------
    location ~ /\.(env|git|htaccess|gitignore) {
        deny all;
        return 404;
    }

    location ~ ^/(server|singem-ai|node_modules|scripts|docs|tests)/ {
        deny all;
        return 404;
    }

    # ---- Proxy para a API do backend ----------------------
    # Permite que o frontend use /api/ sem hard-code de porta.
    # O JS atual ainda pode chamar diretamente :3000 (também funciona
    # via CORS). Este proxy é uma camada extra de conveniência.
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        proxy_cache_bypass $http_upgrade;
    }

    # ---- Health passthrough (monitoramento externo) -------
    location = /backend-health {
        proxy_pass       http://backend:3000/health;
        proxy_set_header Host $host;
        access_log       off;
    }

    # ---- Service Worker — nunca usar cache ----------------
    location = /sw.js {
        expires    -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header X-Frame-Options       "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options "nosniff"                      always;
        add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
    }

    # ---- Assets estáticos com cache longo -----------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|pdf)$ {
        expires            7d;
        add_header         Cache-Control "public, max-age=604800, must-revalidate";
        add_header         X-Frame-Options       "SAMEORIGIN"                    always;
        add_header         X-Content-Type-Options "nosniff"                      always;
        add_header         Referrer-Policy       "strict-origin-when-cross-origin" always;
        access_log         off;
    }

    # ---- version.json — sem cache -------------------------
    location = /version.json {
        expires    -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Frame-Options       "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options "nosniff"                      always;
        add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
    }

    # ---- SPA fallback / rotas client-side -----------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
