# ============================================================
# SINGEM — Nginx configuration
# Serve o frontend estático e faz proxy da API para o backend
# ============================================================

# ---- Rate Limiting (proteção DDoS) ------------------------
# Zona geral: 30 req/s por IP (burst até 60)
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
# Zona API: 20 req/s por IP
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
# Zona login/auth: 5 req/s por IP (proteção brute-force)
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
# Limite de conexões simultâneas por IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Limites gerais ------------------------------------
    limit_conn conn_limit 50;
    limit_req  zone=general burst=60 nodelay;

    # Retorna 429 (Too Many Requests) em vez de 503
    limit_req_status  429;
    limit_conn_status 429;

    # ---- Compressão ----------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;
    gzip_min_length 256;

    # ---- Segurança básica ----------------------------------
    add_header X-Frame-Options       "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ---- Bloqueia acesso a arquivos sensíveis --------------
    location ~ /\.(env|git|htaccess|gitignore) {
        deny all;
        return 404;
    }

    location ~ ^/(server|singem-ai|node_modules|scripts|docs|tests)/ {
        deny all;
        return 404;
    }

    # ---- Proxy para a API do backend ----------------------
    # Permite que o frontend use /api/ sem hard-code de porta.
    # O JS atual ainda pode chamar diretamente :3000 (também funciona
    # via CORS). Este proxy é uma camada extra de conveniência.
    location /api/ {
        limit_req zone=api burst=30 nodelay;

        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        proxy_cache_bypass $http_upgrade;
    }

    # ---- Auth endpoints — rate limit rigoroso -------------
    location ~ ^/api/(auth|login|token) {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- Health passthrough (monitoramento externo) -------
    location = /health {
        proxy_pass       http://backend:3000/health;
        proxy_set_header Host $host;
        access_log       off;
    }

    location = /backend-health {
        proxy_pass       http://backend:3000/health;
        proxy_set_header Host $host;
        access_log       off;
    }

    # ---- Service Worker — nunca usar cache ----------------
    location = /sw.js {
        expires    -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header X-Frame-Options       "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options "nosniff"                      always;
        add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
    }

    # ---- JS/CSS críticos sem cache (consistência entre máquinas) ----
    location ~* \.(js|css)$ {
        expires            -1;
        add_header         Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header         X-Frame-Options       "SAMEORIGIN"                    always;
        add_header         X-Content-Type-Options "nosniff"                      always;
        add_header         Referrer-Policy       "strict-origin-when-cross-origin" always;
        access_log         off;
    }

    # ---- Assets de mídia com cache longo ------------------
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|pdf)$ {
        expires            7d;
        add_header         Cache-Control "public, max-age=604800, must-revalidate";
        add_header         X-Frame-Options       "SAMEORIGIN"                    always;
        add_header         X-Content-Type-Options "nosniff"                      always;
        add_header         Referrer-Policy       "strict-origin-when-cross-origin" always;
        access_log         off;
    }

    # ---- version.json — sem cache -------------------------
    location = /version.json {
        expires    -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Frame-Options       "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options "nosniff"                      always;
        add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
    }

    # ---- SPA fallback / rotas client-side -----------------
    location / {
        expires    -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
