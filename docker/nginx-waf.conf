# ============================================================
# SINGEM — Nginx WAF configuration
# Compatível com owasp/modsecurity-crs:nginx-alpine
# O ModSecurity é carregado automaticamente pela imagem base
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Rate Limiting ------------------------------------
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    limit_conn conn_limit 50;
    limit_req  zone=general burst=60 nodelay;
    limit_req_status  429;
    limit_conn_status 429;

    # ---- Compressão ----------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;
    gzip_min_length 256;

    # ---- Segurança -----------------------------------------
    add_header X-Frame-Options       "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection      "1; mode=block"                 always;

    # ---- Bloqueia acesso a arquivos sensíveis --------------
    location ~ /\.(env|git|htaccess|gitignore) {
        deny all;
        return 404;
    }

    location ~ ^/(server|node_modules|scripts|docs|tests)/ {
        deny all;
        return 404;
    }

    # ---- Auth — rate limit rígido -------------------------
    location ^~ /api/auth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_cache_bypass    $http_upgrade;
    }

    # ---- Proxy API (com WAF + rate limit) -----------------
    location /api/ {
        limit_req zone=api burst=30 nodelay;

        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_cache_bypass    $http_upgrade;
    }

    # ---- Health -------------------------------------------
    location = /backend-health {
        proxy_pass       http://backend:3000/health;
        proxy_set_header Host $host;
        access_log       off;
    }

    # ---- Metrics (Prometheus) — sem WAF -------------------
    location = /backend-metrics {
        proxy_pass       http://backend:3000/metrics;
        proxy_set_header Host $host;
        access_log       off;
        # ModSecurity off para endpoint interno
        modsecurity off;
    }

    # ---- Service Worker — no cache ------------------------
    location = /sw.js {
        expires    -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header X-Frame-Options       "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options "nosniff"                      always;
    }

    # ---- Static assets ------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|pdf)$ {
        expires            7d;
        add_header         Cache-Control "public, max-age=604800, must-revalidate";
        add_header         X-Frame-Options       "SAMEORIGIN"                    always;
        add_header         X-Content-Type-Options "nosniff"                      always;
        access_log         off;
        # Static assets não precisam de WAF
        modsecurity off;
    }

    # ---- version.json — sem cache -------------------------
    location = /version.json {
        expires    -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ---- SPA fallback -------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
