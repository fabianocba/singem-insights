# ============================================================
# SINGEM — Nginx production configuration
# Serve frontend e faz proxy /api para backend
# ============================================================

limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    limit_conn conn_limit 50;
    limit_req  zone=general burst=60 nodelay;

    limit_req_status  429;
    limit_conn_status 429;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;
    gzip_min_length 256;

    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    location ~ /\.(env|git|htaccess|gitignore) {
        deny all;
        return 404;
    }

    location ~ ^/(server|singem-ai|node_modules|scripts|docs|tests)/ {
        deny all;
        return 404;
    }

    location ^~ /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_cache_bypass $http_upgrade;
    }

    location = /health {
        proxy_pass       http://backend:3000/health;
        proxy_set_header Host $host;
        access_log       off;
    }

    location = /backend-health {
        proxy_pass       http://backend:3000/health;
        proxy_set_header Host $host;
        access_log       off;
    }

    location = /sw.js {
        expires    -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    location ~* \.(js|css)$ {
        expires            -1;
        add_header         Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        access_log         off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|pdf)$ {
        expires            7d;
        add_header         Cache-Control "public, max-age=604800, must-revalidate";
        access_log         off;
    }

    location = /version.json {
        expires    -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
