# ============================================================
# SINGEM — Override TLS para produção VPS
# Usa certificados reais já provisionados no host.
#
# Uso:
#   docker compose \
#     --env-file docker/prod/.env \
#     -f docker/prod/docker-compose.yml \
#     -f docker/prod/docker-compose.ssl.yml \
#     up -d --build
# ============================================================

services:
  frontend:
    ports:
      - '${FRONTEND_PORT_HTTP:-80}:80'
      - '${FRONTEND_PORT_HTTPS:-443}:443'
    volumes:
      - type: bind
        source: ${SSL_CERT_FULLCHAIN_PATH:-/etc/letsencrypt/live/singem.cloud/fullchain.pem}
        target: /etc/nginx/ssl/fullchain.pem
        read_only: true
      - type: bind
        source: ${SSL_CERT_PRIVKEY_PATH:-/etc/letsencrypt/live/singem.cloud/privkey.pem}
        target: /etc/nginx/ssl/privkey.pem
        read_only: true
      - type: bind
        source: ../nginx-ssl.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
