# ============================================================
# SINGEM — Docker Compose PRODUÇÃO (VPS)
# Arquivo oficial de produção.
# ============================================================

name: singem-prod

networks:
  singem-network:
    driver: bridge

services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME obrigatória}
      POSTGRES_USER: ${DB_USER:?DB_USER obrigatória}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatória}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - 'postgres'
      - '-c'
      - 'shared_buffers=256MB'
      - '-c'
      - 'work_mem=16MB'
      - '-c'
      - 'maintenance_work_mem=128MB'
      - '-c'
      - 'effective_cache_size=512MB'
      - '-c'
      - 'log_min_duration_statement=1000'
      - '-c'
      - 'log_connections=on'
      - '-c'
      - 'log_disconnections=on'
    volumes:
      - ${SINGEM_DATA_HOST_PATH:-/opt/singem/data}/postgres:/var/lib/postgresql/data
    networks:
      - singem-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: always
    command: >-
      redis-server
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD obrigatória}
    volumes:
      - ${SINGEM_DATA_HOST_PATH:-/opt/singem/data}/redis:/data
    networks:
      - singem-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:?REDIS_PASSWORD obrigatória}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ../..
      dockerfile: Dockerfile.backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:?DB_NAME obrigatória}
      DB_USER: ${DB_USER:?DB_USER obrigatória}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatória}
      DATABASE_URL: ''
      DB_SSL: 'false'
      DB_CONNECTION_TIMEOUT_MS: ${DB_CONNECTION_TIMEOUT_MS:-5000}
      DB_HEALTHCHECK_TIMEOUT_MS: ${DB_HEALTHCHECK_TIMEOUT_MS:-5000}
      TRUST_PROXY: 'true'
      API_BODY_LIMIT: ${API_BODY_LIMIT:-10mb}
      CORS_ORIGINS: '${CORS_ORIGINS:?CORS_ORIGINS obrigatória}'
      FRONTEND_URL: '${FRONTEND_URL:?FRONTEND_URL obrigatória}'
      JWT_SECRET: '${JWT_SECRET:?JWT_SECRET obrigatória (min 32 chars)}'
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-adm}
      ADMIN_NOME: ${ADMIN_NOME:-Administrador SINGEM}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ifbaiano.edu.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD obrigatória}
      GOVBR_ENABLED: ${GOVBR_ENABLED:-false}
      SERPRO_ENABLED: ${SERPRO_ENABLED:-false}
      SERPROID_ENABLED: ${SERPROID_ENABLED:-false}
      CATMAT_ENABLED: ${CATMAT_ENABLED:-false}
      CATMAT_OBRIGATORIO: ${CATMAT_OBRIGATORIO:-false}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD obrigatória}@redis:6379
      STORAGE_BASE_PATH: /app/storage
      SINGEM_DATA_MODE: ${SINGEM_DATA_MODE:-real}
      UPLOAD_MAX_FILE_SIZE_BYTES: ${UPLOAD_MAX_FILE_SIZE_BYTES:-26214400}
      UPLOAD_ALLOWED_MIME_TYPES: ${UPLOAD_ALLOWED_MIME_TYPES:-application/pdf,application/xml,text/xml,text/plain,image/png,image/jpeg,application/zip,application/json}
    ports:
      - '127.0.0.1:3000:3000'
    networks:
      - singem-network
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${SINGEM_STORAGE_HOST_PATH:-/opt/singem/storage}:/app/storage
      - ${SINGEM_STORAGE_HOST_PATH:-/opt/singem/storage}/logs/backend:/app/logs
      - ${SINGEM_CONFIG_HOST_PATH:-/opt/singem/config}:/app/runtime-config
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../..
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - '${FRONTEND_PORT_HTTP:-80}:80'
    networks:
      - singem-network
    depends_on:
      backend:
        condition: service_healthy
