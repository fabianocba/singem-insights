# ============================================================
# SINGEM — docker-compose.loadtest.yml
# Load testing com k6 contra o backend
#
# Uso:
#   # Smoke test rapido (30s)
#   docker compose -f docker-compose.yml -f docker-compose.loadtest.yml run --rm k6-smoke
#
#   # Load test completo (todos os cenarios)
#   docker compose -f docker-compose.yml -f docker-compose.loadtest.yml run --rm k6
#
#   # Com output para Prometheus (requer monitoring stack)
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml -f docker-compose.loadtest.yml run --rm k6-prometheus
# ============================================================

services:

  # ----------------------------------------------------------
  # k6 — cenarios completos (smoke + load + stress)
  # ----------------------------------------------------------
  k6:
    image: grafana/k6:0.51.0
    container_name: singem-k6
    volumes:
      - ./docker/k6:/scripts:ro
    environment:
      BASE_URL: http://backend:3000
    command: run /scripts/singem-load.js
    networks:
      - singem-network
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - loadtest

  # ----------------------------------------------------------
  # k6 smoke — apenas smoke test (30s, 2 VUs)
  # ----------------------------------------------------------
  k6-smoke:
    image: grafana/k6:0.51.0
    container_name: singem-k6-smoke
    volumes:
      - ./docker/k6:/scripts:ro
    environment:
      BASE_URL: http://backend:3000
    command: run --only smoke /scripts/singem-load.js
    networks:
      - singem-network
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - loadtest

  # ----------------------------------------------------------
  # k6 com output Prometheus (remote write)
  # ----------------------------------------------------------
  k6-prometheus:
    image: grafana/k6:0.51.0
    container_name: singem-k6-prometheus
    volumes:
      - ./docker/k6:/scripts:ro
    environment:
      BASE_URL: http://backend:3000
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "true"
    command: run -o experimental-prometheus-rw /scripts/singem-load.js
    networks:
      - singem-network
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - loadtest

networks:
  singem-network:
    external: true
    name: singem-network
