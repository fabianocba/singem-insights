# ============================================================
# SINGEM — docker-compose.logging.yml
# Agregacao de logs com Grafana Loki + Promtail
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml -f docker-compose.logging.yml up -d
#
# Acessos:
#   - Loki:     http://localhost:3200 (API)
#   - Grafana:  http://localhost:3100 (Explore -> Loki)
# ============================================================

services:

  # ----------------------------------------------------------
  # Loki — armazenamento de logs
  # ----------------------------------------------------------
  loki:
    image: grafana/loki:3.0.0
    container_name: singem-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "${LOKI_PORT:-3200}:3100"
    networks:
      - singem-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ----------------------------------------------------------
  # Promtail — coleta de logs dos containers
  # ----------------------------------------------------------
  promtail:
    image: grafana/promtail:3.0.0
    container_name: singem-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./docker/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/positions
    networks:
      - singem-network
    depends_on:
      loki:
        condition: service_healthy

  # ----------------------------------------------------------
  # Grafana — adiciona datasource Loki automaticamente
  # ----------------------------------------------------------
  grafana:
    volumes:
      - ./docker/grafana/provisioning/datasources/loki.yml:/etc/grafana/provisioning/datasources/loki.yml:ro

networks:
  singem-network:
    external: true
    name: singem-network

volumes:
  loki_data:
    name: singem_loki_data
  promtail_positions:
    name: singem_promtail_positions
