# ============================================================
# SINGEM — docker-compose.staging.yml  [DEPRECATED]
#
# ⚠ ESTE ARQUIVO SERÁ REMOVIDO EM VERSÃO FUTURA.
# Use docker/local/docker-compose.yml para staging local.
#
# Mantido temporariamente para compatibilidade.
# ============================================================

services:
  # ----------------------------------------------------------
  # PostgreSQL — configuração leve
  # ----------------------------------------------------------
  postgres:
    restart: unless-stopped
    command:
      - 'postgres'
      - '-c'
      - 'shared_buffers=128MB'
      - '-c'
      - 'work_mem=8MB'
      - '-c'
      - 'log_min_duration_statement=500'
      - '-c'
      - 'log_statement=ddl'
    deploy:
      resources:
        limits:
          memory: 512M

  # ----------------------------------------------------------
  # Redis
  # ----------------------------------------------------------
  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # ----------------------------------------------------------
  # Backend — staging mode
  # ----------------------------------------------------------
  backend:
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      TRUST_PROXY: 'true'
      LOG_LEVEL: debug

      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://staging.singem.ifbaiano.edu.br}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}

      REDIS_URL: redis://redis:6379
    ports: !override
      - '${BACKEND_PORT_EXTERNAL:-3000}:3000'
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ----------------------------------------------------------
  # Frontend — staging (HTTP, porta 8080)
  # ----------------------------------------------------------
  frontend:
    restart: unless-stopped
    ports: !override
      - '${FRONTEND_PORT_EXTERNAL:-8080}:80'
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ----------------------------------------------------------
  # AI Core — staging
  # ----------------------------------------------------------
  ai-core:
    restart: unless-stopped
    environment:
      APP_ENV: staging
      APP_DEBUG: 'true'
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'
