<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciar Backups - SINGEM</title>
    <script type="module" src="../js/versionManager.js"></script>
    <script src="../js/ui/themeBoot.js"></script>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/tailwind.css" />
  </head>
  <body data-page="gerenciar-backups" class="sg-standalone-page">
    <div class="backup-container">
      <header class="backup-header">
        <div>
          <h1>Gerenciar backups</h1>
          <p>Sistema de backup automático e restauração de dados</p>
        </div>
        <div class="backup-actions">
          <button class="btn btn-primary" onclick="criarBackupManual(this)">
            Criar backup agora
          </button>
          <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">
            Importar backup
          </button>
          <button type="button" data-theme-toggle aria-label="Alternar tema"></button>
          <input
            type="file"
            id="importFile"
            accept=".json"
            class="sg-hidden-file-input"
            title="Selecionar arquivo de backup para importacao"
            onchange="importarBackup(event)"
          />
          <button class="btn btn-warning" onclick="window.location.href = '../index.html'">
            Voltar
          </button>
        </div>
      </header>

      <div class="backup-list" id="backupList">
        <div class="empty-state">
          <div class="empty-state-icon material-symbols-outlined" aria-hidden="true">archive</div>
          <p>Carregando backups...</p>
        </div>
      </div>

      <div class="changelog-section">
        <h2>Historico de alteracoes</h2>
        <div id="changelogList"></div>
      </div>
    </div>

    <script src="../js/core/dataBackup.js"></script>
    <script type="module" src="../js/gerenciarBackupsPage.js"></script>

    <footer id="app-version-container" class="app-version-footer">
      <small id="app-version">Versão: carregando...</small>
    </footer>
    <script type="module" src="../js/ui/pageEnhancer.js"></script>
  </body>
</html>
