<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciar Backups - SINGEM</title>
    <script type="module" src="../js/versionManager.js"></script>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .backup-container {
        max-width: 1200px;
        margin: 20px auto;
        padding: 20px;
      }

      .backup-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .backup-actions {
        display: flex;
        gap: 10px;
      }

      .backup-list {
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .backup-item {
        padding: 15px;
        border-bottom: 1px solid #e0e0e0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: background 0.2s;
      }

      .backup-item:hover {
        background: #f5f5f5;
      }

      .backup-item:last-child {
        border-bottom: none;
      }

      .backup-info {
        flex: 1;
      }

      .backup-meta {
        display: flex;
        gap: 20px;
        margin-top: 5px;
        font-size: 0.9em;
        color: #666;
      }

      .backup-meta span {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .backup-buttons {
        display: flex;
        gap: 10px;
      }

      .btn {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
      }

      .btn-primary {
        background: #2e7d32;
        color: white;
      }

      .btn-primary:hover {
        background: #1b5e20;
      }

      .btn-secondary {
        background: #1976d2;
        color: white;
      }

      .btn-secondary:hover {
        background: #1565c0;
      }

      .btn-danger {
        background: #d32f2f;
        color: white;
      }

      .btn-danger:hover {
        background: #c62828;
      }

      .btn-warning {
        background: #f57c00;
        color: white;
      }

      .btn-warning:hover {
        background: #ef6c00;
      }

      .changelog-section {
        margin-top: 40px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        padding: 20px;
      }

      .changelog-item {
        padding: 10px;
        border-left: 3px solid #2e7d32;
        margin-bottom: 10px;
        background: #f5f5f5;
      }

      .changelog-time {
        font-size: 0.85em;
        color: #666;
        margin-bottom: 5px;
      }

      .changelog-action {
        font-weight: 600;
        color: #2e7d32;
      }

      .status-badge {
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.85em;
        font-weight: 600;
      }

      .status-auto {
        background: #e3f2fd;
        color: #1976d2;
      }

      .status-manual {
        background: #fff3e0;
        color: #f57c00;
      }

      .status-restore {
        background: #fce4ec;
        color: #c2185b;
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #999;
      }

      .empty-state-icon {
        font-size: 64px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="backup-container">
      <div class="backup-header">
        <div>
          <h1>🔒 Gerenciar Backups</h1>
          <p>Sistema de backup automático e restauração de dados</p>
        </div>
        <div class="backup-actions">
          <button class="btn btn-primary" onclick="criarBackupManual()">
            💾 Criar Backup Agora
          </button>
          <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">
            📥 Importar Backup
          </button>
          <input
            type="file"
            id="importFile"
            accept=".json"
            style="display: none"
            onchange="importarBackup(event)"
          />
          <button class="btn btn-warning" onclick="window.location.href='../index.html'">
            ← Voltar
          </button>
        </div>
      </div>

      <div class="backup-list" id="backupList">
        <div class="empty-state">
          <div class="empty-state-icon">📦</div>
          <p>Carregando backups...</p>
        </div>
      </div>

      <div class="changelog-section">
        <h2>📝 Histórico de Alterações</h2>
        <div id="changelogList"></div>
      </div>
    </div>

    <script src="../js/core/dataBackup.js"></script>
    <script>
      // Inicializa sistema
      let backupManager;

      async function init() {
        try {
          backupManager = window.dataBackupManager;
          await backupManager.init();

          await carregarBackups();
          await carregarChangelog();

          console.log('[BACKUPS] ✅ Interface inicializada');
        } catch (error) {
          console.error('[BACKUPS] ❌ Erro ao inicializar:', error);
          alert('Erro ao carregar backups: ' + error.message);
        }
      }

      async function carregarBackups() {
        const list = document.getElementById('backupList');

        try {
          const backups = await backupManager.listBackups();

          if (backups.length === 0) {
            list.innerHTML = `
              <div class="empty-state">
                <div class="empty-state-icon">📦</div>
                <p>Nenhum backup encontrado</p>
                <button class="btn btn-primary" onclick="criarBackupManual()">
                  Criar Primeiro Backup
                </button>
              </div>
            `;
            return;
          }

          // Ordena por timestamp decrescente
          backups.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

          list.innerHTML = backups
            .map(
              (backup) => `
            <div class="backup-item">
              <div class="backup-info">
                <div>
                  <strong>Backup #${backup.id}</strong>
                  <span class="status-badge status-${backup.type}">
                    ${backup.type === 'auto' ? '🤖 Automático' : backup.type === 'manual' ? '👤 Manual' : backup.type === 'imported' ? '📥 Importado' : '🔄 Restauração'}
                  </span>
                </div>
                <div class="backup-meta">
                  <span>📅 ${new Date(backup.timestamp).toLocaleString('pt-BR')}</span>
                  <span>👥 ${backup.usuarios} usuário(s)</span>
                  <span>🏢 ${backup.unidades} unidade(s)</span>
                  <span>💾 ${formatBytes(backup.size)}</span>
                </div>
              </div>
              <div class="backup-buttons">
                <button class="btn btn-primary" onclick="restaurarBackup(${backup.id})">
                  ↩️ Restaurar
                </button>
                <button class="btn btn-secondary" onclick="exportarBackup(${backup.id})">
                  📤 Exportar
                </button>
              </div>
            </div>
          `
            )
            .join('');
        } catch (error) {
          console.error('[BACKUPS] ❌ Erro ao carregar:', error);
          list.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">⚠️</div>
              <p>Erro ao carregar backups: ${error.message}</p>
            </div>
          `;
        }
      }

      async function carregarChangelog() {
        const list = document.getElementById('changelogList');

        try {
          const changes = await backupManager.getChangelog(20);

          if (changes.length === 0) {
            list.innerHTML = '<p style="color: #999;">Nenhuma alteração registrada</p>';
            return;
          }

          list.innerHTML = changes
            .map(
              (change) => `
            <div class="changelog-item">
              <div class="changelog-time">
                ${new Date(change.timestamp).toLocaleString('pt-BR')}
              </div>
              <div class="changelog-action">${formatAction(change.action)}</div>
              <div>${formatDetails(change.details)}</div>
            </div>
          `
            )
            .join('');
        } catch (error) {
          console.error('[BACKUPS] ❌ Erro ao carregar changelog:', error);
        }
      }

      async function criarBackupManual() {
        try {
          const btn = event.target;
          btn.disabled = true;
          btn.textContent = '⏳ Criando...';

          await backupManager.createAutoBackup('manual');
          await carregarBackups();

          btn.disabled = false;
          btn.textContent = '💾 Criar Backup Agora';

          alert('✅ Backup criado com sucesso!');
        } catch (error) {
          console.error('[BACKUPS] ❌ Erro ao criar backup:', error);
          alert('❌ Erro ao criar backup: ' + error.message);
        }
      }

      async function restaurarBackup(id) {
        if (
          !confirm(
            '⚠️ ATENÇÃO: Esta ação irá substituir TODOS os dados atuais pelos dados do backup.\n\nUm backup de segurança será criado antes da restauração.\n\nDeseja continuar?'
          )
        ) {
          return;
        }

        try {
          await backupManager.restoreBackup(id);
          await carregarBackups();
          await carregarChangelog();

          alert('✅ Backup restaurado com sucesso!\n\nRecarregue a página para ver as alterações.');
          window.location.reload();
        } catch (error) {
          console.error('[BACKUPS] ❌ Erro ao restaurar:', error);
          alert('❌ Erro ao restaurar backup: ' + error.message);
        }
      }

      async function exportarBackup(id) {
        try {
          await backupManager.exportBackup(id);
          alert('✅ Backup exportado com sucesso!');
        } catch (error) {
          console.error('[BACKUPS] ❌ Erro ao exportar:', error);
          alert('❌ Erro ao exportar backup: ' + error.message);
        }
      }

      async function importarBackup(event) {
        const file = event.target.files[0];
        if (!file) return;

        try {
          await backupManager.importBackup(file);
          await carregarBackups();

          alert('✅ Backup importado com sucesso!');
        } catch (error) {
          console.error('[BACKUPS] ❌ Erro ao importar:', error);
          alert('❌ Erro ao importar backup: ' + error.message);
        }
      }

      function formatBytes(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      }

      function formatAction(action) {
        const actions = {
          save_usuario: '💾 Usuário Salvo',
          delete_usuario: '🗑️ Usuário Excluído',
          save_unidade: '🏢 Unidade Salva',
          restore: '↩️ Backup Restaurado',
          import: '📥 Backup Importado'
        };
        return actions[action] || action;
      }

      function formatDetails(details) {
        if (!details) return '';

        const parts = [];
        if (details.login) parts.push(`Login: ${details.login}`);
        if (details.nome) parts.push(`Nome: ${details.nome}`);
        if (details.backupId) parts.push(`Backup ID: ${details.backupId}`);

        return parts.join(' • ');
      }

      // Inicializa ao carregar
      window.addEventListener('load', init);
    </script>
  </body>
</html>
